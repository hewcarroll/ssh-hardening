# SSH hardening — drop-in overrides for /etc/ssh/sshd_config.d/.
#
# Supplements sshd_config without replacing it. Drop-ins load in lexical order;
# the 50- prefix leaves room to override here with a higher-numbered file
# (e.g. /etc/ssh/sshd_config.d/99-local.conf).
#
# WARNING: keys-only auth is enforced below. Make sure you have a working
# ~/.ssh/authorized_keys entry BEFORE you reload sshd, or you can lock yourself
# out. Always validate with `sshd -t` first.

# Authentication: keys only, no root, no empty passwords.
PasswordAuthentication no
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no
PermitRootLogin no
PermitEmptyPasswords no

# Limit auth attempts and session count.
MaxAuthTries 3
MaxSessions 10
LoginGraceTime 30

# Forwarding off by default; enable per-host as needed.
AllowTcpForwarding no
X11Forwarding no
PermitTunnel no

# Blacklist weak algorithms that have lingered in some distros.
KexAlgorithms -diffie-hellman-group1-sha1,diffie-hellman-group14-sha1
Ciphers -aes*-cbc,3des-cbc
MACs -*-sha1,*-sha1-*

# Optional pre-auth banner (uncomment and provide the file):
# Banner /etc/issue.net
