# SSH hardening — drop-in overrides for /etc/ssh/sshd_config.d/.
#
# Supplements sshd_config without replacing it. On Debian/Ubuntu the line
# 'Include /etc/ssh/sshd_config.d/*.conf' sits NEAR THE TOP of sshd_config, and
# OpenSSH uses the FIRST obtained value for most keywords. Drop-ins load in
# lexical order, so the FIRST file to set a keyword wins. To override anything
# here, use a LOWER-numbered file (e.g. /etc/ssh/sshd_config.d/10-local.conf),
# NOT a higher-numbered one. (Exception: the Ciphers/MACs/KexAlgorithms +/-/^
# list modifiers and Match blocks have their own scoping.)
#
# This drop-in only takes effect if sshd_config actually Includes this directory
# (added to sshd_config in OpenSSH 8.2). After reloading, confirm it is live:
#   sudo sshd -T | grep -Ei 'passwordauthentication|permitrootlogin|maxauthtries'
# (sshd -t only checks syntax — it does NOT prove the drop-in was read.)
#
# WARNING: keys-only auth is enforced below. Make sure the account you log in as
# has a working ~/.ssh/authorized_keys entry BEFORE you reload sshd, or you can
# lock yourself out. Keep a second session open and validate with `sshd -t`.

# Authentication: keys only, no root password, no empty passwords.
PubkeyAuthentication yes
PasswordAuthentication no
# ChallengeResponseAuthentication is a deprecated alias for KbdInteractiveAuthentication
# (same option, renamed in OpenSSH 8.7). Setting both to 'no' is harmless duplication.
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no
PermitEmptyPasswords no

# Root login. 'prohibit-password' keeps key-based root working while blocking
# password root — use it if root+key is your ONLY login (common on VPS,
# bare-metal and cloud images). Switch to 'no' only when you have a separate,
# key-capable sudo account that you have already TESTED, or you will permanently
# block root with no recovery except console/IPMI/rescue mode.
PermitRootLogin prohibit-password

# Disable legacy / cross-distro trust and environment vectors. Defaults already
# match these on stock Debian/Ubuntu, but RHEL-family has historically shipped
# GSSAPI enabled, so pin them explicitly to be self-contained.
GSSAPIAuthentication no
HostbasedAuthentication no
IgnoreRhosts yes
IgnoreUserKnownHosts yes
PermitUserEnvironment no

# Keep PAM account/session checks (lockout, expiry, access lists) in effect.
# Required for PAM-based lockout/allowlist modules; assert for non-Debian targets.
UsePAM yes

# Limit auth attempts and session count.
# NOTE: MaxAuthTries also caps how many keys an agent may offer before being
# disconnected. Users with many loaded keys can hit this before the right key is
# tried — use 'IdentitiesOnly yes' client-side, or raise this value.
MaxAuthTries 3
MaxSessions 10

# LoginGraceTime caps the pre-auth window. NOTE: a non-zero value does NOT
# mitigate CVE-2024-6387 (regreSSHion, OpenSSH 8.5p1 to <9.8p1). The real fix is
# patching OpenSSH; LoginGraceTime 0 is a stopgap on unpatched hosts (it disables
# the timeout and raises connection-exhaustion DoS risk).
LoginGraceTime 30

# Throttle pre-auth connection floods (start:rate:full). Keys-only auth already
# neutralizes credential brute force; this blunts connection-storm DoS.
MaxStartups 10:30:60
# PerSourceMaxStartups / PerSourceNetBlockSize need OpenSSH >= 8.5 (not on
# RHEL 8 / older). Uncomment if your OpenSSH supports them:
# PerSourceMaxStartups 10
# PerSourceNetBlockSize 32:128

# Restrict login to members of an allowlist group (least privilege).
# CREATE THE GROUP AND ADD YOUR USERS BEFORE uncommenting, or you lock everyone out:
#   sudo groupadd ssh-users && sudo usermod -aG ssh-users <you>
# AllowGroups ssh-users

# Reap idle / dead sessions server-side (300s x 2 = 600s idle disconnect; CIS/STIG).
ClientAliveInterval 300
ClientAliveCountMax 2

# Forwarding off by default; re-enable per-user via a Match block (NOT a higher-
# numbered drop-in — first-value-wins means a later bare 'AllowTcpForwarding yes'
# is ignored). AllowTcpForwarding no breaks ssh -L/-R/-D tunnels, ProxyJump
# bastions, DB tunnels and some IDE remote features. Example to re-enable:
#   Match Group tunnel-users
#       AllowTcpForwarding yes
AllowTcpForwarding no
AllowAgentForwarding no
GatewayPorts no
X11Forwarding no
PermitTunnel no

# Compression default ('yes') already defers compression until after auth
# (pre-auth compression removed in OpenSSH 7.4); 'no' is the conservative pin.
Compression no
# Single-stack hosts can pin the listener family to reduce exposed surface:
# AddressFamily inet      # IPv4 only
# AddressFamily inet6     # IPv6 only

# Log the public-key fingerprint used to authenticate each session (attribution
# / forensics on a keys-only server). STIG requires VERBOSE; CIS accepts INFO too.
LogLevel VERBOSE

# Remove weak algorithms. These subtract from the OpenSSH *default* set. On
# OpenSSH 7.6+ the CBC ciphers, 3des-cbc and group1/group14-sha1 kex are already
# absent from the default, so the Ciphers/KexAlgorithms lines are belt-and-
# suspenders no-ops on a stock modern server (they help only on pre-7.6 OpenSSH).
# The MACs line is the only one that actively changes a modern default; its two
# globs together catch every SHA-1 MAC (bare hmac-sha1 AND the -etm variants).
# Pruning these can lock out legacy/embedded clients — test before fleet rollout.
KexAlgorithms -diffie-hellman-group1-sha1,diffie-hellman-group14-sha1,diffie-hellman-group-exchange-sha1
Ciphers -aes*-cbc,3des-cbc
MACs -*-sha1,*-sha1-*
#
# For a version-independent guarantee (deterministic accepted set, resists a
# distro re-adding an algorithm), replace the three lines above with explicit
# allowlists instead of the subtractive form:
# KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
# Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
# MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com

# Optional pre-auth banner (uncomment and provide the file):
# Banner /etc/issue.net
